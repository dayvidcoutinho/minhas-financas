      </div>
      <div class="modal-body">
        <div style="background:var(--accent-lt);border:1px solid rgba(108,63,199,.25);border-radius:11px;padding:14px">
          <div class="row gap-10 wrap">
            <div><span style="font-weight:800;font-size:18px;color:var(--accent)">${total}</span> <span class="text-muted text-sm">lançamentos encontrados</span></div>
            ${dups?`<div><span style="font-weight:800;font-size:18px;color:var(--orange)">${dups}</span> <span class="text-muted text-sm">possíveis duplicatas (desmarcadas)</span></div>`:''}
            <div><span style="font-weight:800;font-size:18px;color:var(--green)">${sel}</span> <span class="text-muted text-sm">selecionadas para importar</span></div>
          </div>
        </div>

        ${S.cartoes.length?`<div class="inp-wrap"><label>Atribuir ao cartão</label><select id="import-card-sel">${cardOpts}</select></div>`:`<div style="background:var(--red-lt);border:1px solid rgba(229,69,69,.3);border-radius:9px;padding:12px;font-size:13px;color:var(--red)">⚠️ Cadastre um cartão primeiro antes de importar.</div>`}

        <div style="display:flex;gap:8px;margin-bottom:4px">
          <button id="btn-sel-all" class="${btnC('ghost','sm')}">Selecionar todas</button>
          <button id="btn-desel-all" class="${btnC('ghost','sm')}">Desmarcar todas</button>
          <button id="btn-sel-nodup" class="${btnC('ghost','sm')}">Só novas</button>
        </div>

        <div style="border:1px solid var(--border);border-radius:11px;overflow:hidden;max-height:400px;overflow-y:auto">
          <table style="width:100%;border-collapse:collapse;font-size:12px">
            <thead><tr style="background:var(--bg);position:sticky;top:0">
              <th style="padding:8px 10px;text-align:left;font-weight:700;color:var(--muted);font-size:11px;border-bottom:1px solid var(--border)">✓</th>
              <th style="padding:8px 10px;text-align:left;font-weight:700;color:var(--muted);font-size:11px;border-bottom:1px solid var(--border)">Data</th>
              <th style="padding:8px 10px;text-align:left;font-weight:700;color:var(--muted);font-size:11px;border-bottom:1px solid var(--border)">Descrição</th>
              <th style="padding:8px 10px;text-align:left;font-weight:700;color:var(--muted);font-size:11px;border-bottom:1px solid var(--border)">Categoria</th>
              <th style="padding:8px 10px;text-align:right;font-weight:700;color:var(--muted);font-size:11px;border-bottom:1px solid var(--border)">Valor</th>
            </tr></thead>
            <tbody>
              ${S.importRows.map((r,i)=>`
              <tr style="border-bottom:1px solid var(--border);background:${r.dup?'rgba(221,107,32,.04)':r.checked?'transparent':'rgba(0,0,0,.02)'}">
                <td style="padding:8px 10px"><input type="checkbox" data-imp-chk="${i}" ${r.checked?'checked':''} style="width:15px;height:15px;cursor:pointer;accent-color:var(--accent)"/></td>
                <td style="padding:8px 10px;white-space:nowrap;color:var(--muted)">${r.data.slice(5).replace('-','/')}</td>
                <td style="padding:8px 10px">
                  <div style="font-weight:600;color:${r.checked?'var(--text)':'var(--muted)'}">${esc(r.descricao)}</div>
                  ${r.dup?`<div style="font-size:10px;color:var(--orange);font-weight:600">⚠️ Possível duplicata — já existe lançamento com mesma data e valor</div>`:''}
                </td>
                <td style="padding:8px 10px">
                  <select data-imp-cat="${i}" style="font-size:11px;border:1px solid var(--border);border-radius:6px;padding:3px 6px;background:var(--bg);outline:none;color:var(--text)">
                    ${IMPORT_CATS.map(c=>`<option value="${c}" ${c===r.categoria?'selected':''}>${c}</option>`).join('')}
                  </select>
                </td>
                <td style="padding:8px 10px;text-align:right;font-weight:700;font-family:var(--mono);color:${r.dup?'var(--orange)':'var(--red)'}">R$ ${r.valor.toFixed(2).replace('.',',')}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>

        <div class="row gap-8" style="margin-top:4px">
          <button class="${btnC('ghost')}" id="btn-close-import2" style="flex:1;justify-content:center">Cancelar</button>
          <button class="${btnC('primary')}" id="btn-confirm-import" style="flex:1;justify-content:center" ${!S.cartoes.length?'disabled':''}>
            ${ic('check','#fff')} Importar ${S.importRows.filter(r=>r.checked).length} lançamento(s)
          </button>
        </div>
      </div>
    </div>
  </div>`;
  bindImportEvents();
}

function bindImportEvents(){
  const close=()=>{setState({importRows:[],importSource:''});};
  document.getElementById('btn-close-import')?.addEventListener('click',close);
  document.getElementById('btn-close-import2')?.addEventListener('click',close);
  document.getElementById('modal-overlay')?.addEventListener('click',e=>{if(e.target.id==='modal-overlay')close();});

  document.getElementById('import-card-sel')?.addEventListener('change',e=>{S.importCardId=e.target.value;});

  document.getElementById('btn-sel-all')?.addEventListener('click',()=>{S.importRows=S.importRows.map(r=>({...r,checked:true}));renderImportModal();});
  document.getElementById('btn-desel-all')?.addEventListener('click',()=>{S.importRows=S.importRows.map(r=>({...r,checked:false}));renderImportModal();});
  document.getElementById('btn-sel-nodup')?.addEventListener('click',()=>{S.importRows=S.importRows.map(r=>({...r,checked:!r.dup}));renderImportModal();});

  document.querySelectorAll('[data-imp-chk]').forEach(el=>el.addEventListener('change',e=>{
    const i=+el.dataset.impChk; S.importRows[i].checked=el.checked; renderImportModal();
  }));
  document.querySelectorAll('[data-imp-cat]').forEach(el=>el.addEventListener('change',e=>{
    const i=+el.dataset.impCat; S.importRows[i].categoria=el.value;
  }));

  document.getElementById('btn-confirm-import')?.addEventListener('click',()=>{
    if(!S.importCardId&&S.cartoes.length){S.importCardId=S.cartoes[0].id;}
    const toImport=S.importRows.filter(r=>r.checked);
    if(!toImport.length)return;
    const newLancs=toImport.map(r=>({
      id:uid(), cartaoId:S.importCardId, descricao:r.descricao,
      valor:r.valor, categoria:r.categoria, data:r.data,
      mes:r.mes||S.mes, parcelas:'1', reembolso:false
    }));
    S.lancs=[...newLancs,...S.lancs];
    save();
    setState({importRows:[], tab:'cartoes'});
    alert(`✅ ${newLancs.length} lançamento(s) importado(s) com sucesso!`);
  });
}

function loadImportData(d){
  const rows=d.lancamentos||[];
  if(!rows.length){alert('Nenhum lançamento encontrado.');return;}
  const isDup=l=>S.lancs.some(x=>x.data===l.data&&Math.abs(+x.valor-(+l.valor))<0.01);
  const importRows=rows.map(l=>({...l,mes:d.mes||S.mes,checked:!isDup(l),dup:isDup(l)}));
  if(!S.importCardId&&S.cartoes.length) S.importCardId=S.cartoes[0].id;
  S.importSource=d.source||'';
  S.importRows=importRows;
  renderImportModal();
}

function loadImportFile(file){
  const r=new FileReader();
  r.onload=e=>{
    try{loadImportData(JSON.parse(e.target.result));}
    catch{alert('Arquivo inválido.');}
  };
  r.readAsText(file);
}

function exportData(){
  const b=new Blob([JSON.stringify({receitas:S.receitas,despesas:S.despesas,cartoes:S.cartoes,lancs:S.lancs,invest:S.invest,investMetas:S.investMetas,investAporte:S.investAporte,investHistorico:S.investHistorico,reservaMeses:S.reservaMeses,budgets:S.budgets,v:'mf6'},null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`financas-${today()}.json`;a.click();URL.revokeObjectURL(u);
}
function importData(file){
  const r=new FileReader();
  r.onload=e=>{
    try{const d=JSON.parse(e.target.result);if(d.receitas)S.receitas=d.receitas;if(d.despesas)S.despesas=d.despesas;if(d.cartoes)S.cartoes=d.cartoes;if(d.lancs)S.lancs=d.lancs;if(d.invest)S.invest=d.invest;if(d.investMetas)S.investMetas=d.investMetas;if(d.investAporte!==undefined)S.investAporte=d.investAporte;if(d.investHistorico)S.investHistorico=d.investHistorico;if(d.reservaMeses)S.reservaMeses=d.reservaMeses;if(d.budgets)S.budgets=d.budgets;save();setState({syncMsg:'✅ Dados importados com sucesso!'});}
    catch{setState({syncMsg:'❌ Arquivo inválido ou corrompido.'});}
  };
  r.readAsText(file);
}

// ── GAS init ─────────────────────────────────────────────────────────────────
if(typeof google !== 'undefined' && google.script){
  document.body.insertAdjacentHTML('beforeend',`
    <div id="gas-loading" style="position:fixed;inset:0;background:var(--nav);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
      <div style="background:var(--accent);border-radius:14px;padding:12px;display:flex">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
      </div>
      <div style="color:#fff;font-family:var(--font);font-weight:700;font-size:16px">Minhas Finanças</div>
      <div style="color:rgba(255,255,255,.5);font-family:var(--font);font-size:13px">Carregando dados do Google Sheets...</div>
    </div>`);

  function _gasInit(raw){
    let temDados = false;
    if(raw){
      try{
        const d = JSON.parse(raw);
        if(d.cartoes?.length)   { S.cartoes  = d.cartoes;  temDados = true; }
        if(d.lancs?.length)     { S.lancs    = d.lancs;    temDados = true; }
        if(d.invest?.length)    { S.invest   = d.invest;   temDados = true; }
        if(d.receitas)           S.receitas  = d.receitas;
        if(d.despesas)           S.despesas  = d.despesas;
        if(d.customCats)         S.customCats= d.customCats;
        if(d.investMetas)        S.investMetas= d.investMetas;
        if(d.investHistorico)    S.investHistorico= d.investHistorico;
        if(d.investAporte!==undefined) S.investAporte= d.investAporte;
        if(d.apiKey)             S.apiKey    = d.apiKey;
        if(d.reservaMeses)       S.reservaMeses = d.reservaMeses;
        if(d.budgets)            S.budgets   = d.budgets;
      }catch(e){ console.error('GAS parse error:', e); }
    }

    const payload = JSON.stringify({
      receitas: S.receitas, despesas: S.despesas,
      cartoes: S.cartoes, lancs: S.lancs, invest: S.invest,
      customCats: S.customCats, investMetas: S.investMetas,
      investHistorico: S.investHistorico, investAporte: S.investAporte,
      apiKey: S.apiKey, reservaMeses: S.reservaMeses, budgets: S.budgets, v:'mf6'
    });
    google.script.run
      .withSuccessHandler(()=>_showGasBadge('✅ Salvo no Sheets'))
      .withFailureHandler(()=>_showGasBadge('❌ Falha ao salvar'))
      .saveData(payload);

    document.getElementById('gas-loading')?.remove();
    render();
  }

  google.script.run
    .withSuccessHandler(_gasInit)
    .withFailureHandler(()=>_gasInit(null))
    .loadData();

} else {
  render();
}
</script>
</body>
</html>
