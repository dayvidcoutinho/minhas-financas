<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Minhas Finanças</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ── Tokens ─────────────────────────────────────────────────────── */
:root{
  --bg:#f5f6fa;
  --panel:#ffffff;
  --nav:#16171c;
  --nav-item:#1e2028;
  --accent:#4a6cf7;
  --accent-dim:#3a5cd6;
  --accent-glow:rgba(74,108,247,.25);
  --green:#22c55e;--green-lt:#f0fdf4;
  --red:#f43f5e;--red-lt:#fff1f2;
  --amber:#f59e0b;--amber-lt:#fffbeb;
  --blue:#3b82f6;--blue-lt:#eff6ff;
  --teal:#14b8a6;--teal-lt:#f0fdfa;
  --purple:#a855f7;
  --text:#0c0e14;--text-2:#3d4257;--muted:#8b91a7;
  --border:#eaecf4;--border-2:#d8dcec;
  --radius:18px;--radius-sm:12px;--radius-xs:8px;
  --font:'Sora',system-ui,sans-serif;
  --mono:'Sora',system-ui,sans-serif;
  --sh:0 2px 8px rgba(12,14,20,.06),0 8px 32px rgba(12,14,20,.06);
  --sh-sm:0 1px 3px rgba(12,14,20,.05),0 3px 10px rgba(12,14,20,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#d8dcec;border-radius:4px}
input,select,button,textarea{font-family:var(--font);font-size:14px}
button{cursor:pointer;border:none;transition:all .18s cubic-bezier(.4,0,.2,1)}
button:active{transform:scale(.97)}
a{color:inherit;text-decoration:none}

/* ── App Shell ──────────────────────────────────────────────────── */
.layout{display:flex;min-height:100vh}

/* ── Sidebar ────────────────────────────────────────────────────── */
.sidebar{
  width:230px;background:var(--nav);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:100;
  overflow-y:auto;overflow-x:hidden;
}
.sb-header{padding:28px 20px 16px;display:flex;align-items:center;gap:11px}
.sb-logo-icon{
  width:36px;height:36px;background:var(--accent);border-radius:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 4px 14px var(--accent-glow)
}
.sb-logo-text{color:#fff;font-weight:800;font-size:15px;letter-spacing:-.3px}
.sb-section{
  padding:5px 20px 5px;
  font-size:10px;font-weight:700;color:rgba(255,255,255,.25);
  letter-spacing:1.4px;text-transform:uppercase;margin-top:10px
}
.sb-nav{flex:1;padding:4px 12px 8px}
.sb-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  border:none;background:transparent;
  color:rgba(255,255,255,.4);font-weight:500;font-size:13px;
  margin-bottom:2px;text-align:left;position:relative;
  letter-spacing:-.1px;transition:all .15s;white-space:nowrap
}
.sb-btn:hover:not(.active){background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.sb-btn.active{background:var(--accent);color:#fff;font-weight:700;box-shadow:0 4px 14px var(--accent-glow)}
.sb-btn.active svg{stroke:#fff}
.sb-badge{margin-left:auto;background:var(--amber);color:#fff;font-size:10px;font-weight:800;padding:2px 7px;border-radius:20px;line-height:1.4}
.sb-divider{border-top:1px solid rgba(255,255,255,.07);margin:10px 12px}
.sb-bottom{padding:0 12px 8px}
.sb-action{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:10px;
  border:none;background:transparent;
  color:rgba(255,255,255,.4);font-weight:500;font-size:13px;
  margin-bottom:2px;text-align:left;transition:all .15s
}
.sb-action:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7)}
.sb-user{
  margin:8px 12px 0;padding:12px 14px;
  background:rgba(255,255,255,.06);border-radius:12px;
  border:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;gap:10px
}
.sb-user-av{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--teal));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:13px;color:#fff;flex-shrink:0
}
.sb-user-name{font-size:12.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-sub{font-size:11px;color:rgba(255,255,255,.35)}
.sb-month{padding:12px 12px 16px;border-top:1px solid rgba(255,255,255,.07);margin-top:6px}
.sb-month label{font-size:10px;color:rgba(255,255,255,.3);display:block;margin-bottom:7px;letter-spacing:1px;text-transform:uppercase;font-weight:700}
.sb-month select{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:9px 12px;color:rgba(255,255,255,.8);font-size:12.5px;outline:none;font-family:var(--font)}
.sb-month select option{background:#1e2028;color:#fff}

/* ── Mobile nav ─────────────────────────────────────────────────── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--nav);z-index:200;padding:8px 0 max(8px,env(safe-area-inset-bottom));border-top:1px solid rgba(255,255,255,.06)}
.mnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;background:none;border:none;color:rgba(255,255,255,.35);font-size:10px;font-weight:600;position:relative}
.mnav-btn.active{color:var(--accent)}
.mnav-btn.active svg{stroke:var(--accent)}

/* ── Main area ──────────────────────────────────────────────────── */
.main{margin-left:230px;min-width:0;flex:1;display:flex;flex-direction:column;min-height:100vh}

/* ── Topbar ─────────────────────────────────────────────────────── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 32px;background:var(--panel);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
}
.topbar-left .page-title{font-size:21px;font-weight:800;letter-spacing:-.4px;line-height:1.1}
.topbar-left .page-sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.topbar-right{display:flex;align-items:center;gap:8px}
.topbar-icon{
  width:38px;height:38px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--panel);display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;color:var(--muted)
}
.topbar-icon:hover{border-color:var(--border-2);background:var(--bg);color:var(--text)}
.topbar-rate{
  display:flex;align-items:center;gap:7px;
  padding:9px 16px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--panel);
  font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer;
  transition:all .15s
}
.topbar-rate:hover{border-color:var(--accent);color:var(--accent);background:var(--bg)}

/* ── Content area ───────────────────────────────────────────────── */
.content{padding:24px 32px 48px;flex:1}

/* ── Responsive ─────────────────────────────────────────────────── */
@media(max-width:700px){
  .sidebar{display:none}
  .main{margin-left:0}
  .topbar{padding:14px 16px}
  .content{padding:16px 14px 80px}
  .mobile-nav{display:flex!important}
  .col-3{grid-template-columns:1fr!important}
  .col-2{grid-template-columns:1fr!important}
  .hide-m{display:none!important}
  /* Colapsa os grids de página (múltiplos cards lado a lado) para 1 coluna — evita corte horizontal */
  [style*="grid-template-columns:1.1fr 1fr 1fr"],
  [style*="grid-template-columns:1.4fr 1fr"],
  [style*="grid-template-columns:1fr 1fr;gap:18px"],
  [style*="grid-template-columns:repeat(4,1fr)"],
  [style*="grid-template-columns:1fr 1fr;gap:16px 32px"],
  [style*="grid-template-columns:1fr 1fr 1fr;gap:12px"],
  [style*="grid-template-columns:repeat(3,1fr)"],
  [style*="grid-template-columns:180px 1fr"],
  [style*="grid-template-columns:260px 1fr"]{
    grid-template-columns:1fr!important;
  }
}

/* ── Panel ──────────────────────────────────────────────────────── */
.panel{background:var(--panel);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--sh)}
.panel-inner{border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--panel)}

/* ── Utilities ──────────────────────────────────────────────────── */
.row{display:flex;align-items:center}
.col{display:flex;flex-direction:column}
.grid{display:grid}
.grid-4{grid-template-columns:repeat(4,1fr);gap:16px}
.grid-2{grid-template-columns:1fr 1fr;gap:14px}
.grid-3{grid-template-columns:1fr 1fr 1fr;gap:14px}
.gap-4{gap:4px}.gap-5{gap:5px}.gap-6{gap:6px}.gap-8{gap:8px}
.gap-10{gap:10px}.gap-12{gap:12px}.gap-14{gap:14px}.gap-16{gap:16px}.gap-20{gap:20px}
.mb-2{margin-bottom:2px}.mb-3{margin-bottom:3px}.mb-4{margin-bottom:4px}
.mb-6{margin-bottom:6px}.mb-8{margin-bottom:8px}.mb-10{margin-bottom:10px}
.mb-12{margin-bottom:12px}.mb-14{margin-bottom:14px}.mb-16{margin-bottom:16px}
.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}
.mt-4{margin-top:4px}.mt-6{margin-top:6px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}
.p-14{padding:14px}.p-16{padding:16px}.p-20{padding:20px}.p-24{padding:24px}
.flex-1{flex:1}.between{justify-content:space-between}.wrap{flex-wrap:wrap}
.overflow-hidden{overflow:hidden}.text-right{text-align:right}
.text-muted{color:var(--muted)}.text-sm{font-size:12px}.text-xs{font-size:11px}
.fw-500{font-weight:500}.fw-600{font-weight:600}.fw-700{font-weight:700}.fw-800{font-weight:800}
.mono{font-family:var(--font);font-variant-numeric:tabular-nums lining-nums;letter-spacing:-.2px}
.divider{border-top:1px solid var(--border);margin:12px 0}

/* ── Buttons ────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--radius-sm);font-weight:600;font-size:13px;border:none;white-space:nowrap;letter-spacing:-.15px}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 14px var(--accent-glow)}
.btn-primary:hover{background:var(--accent-dim);box-shadow:0 6px 20px var(--accent-glow)}
.btn-outline{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn-outline:hover{background:rgba(74,108,247,.06)}
.btn-ghost{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--bg);border-color:var(--border-2);color:var(--text-2)}
.btn-green{background:var(--green);color:#fff}
.btn-teal{background:var(--teal);color:#fff}
.btn-ai{background:linear-gradient(135deg,var(--accent),var(--teal));color:#fff;box-shadow:0 4px 14px rgba(74,108,247,.3)}
.btn-sm{padding:7px 12px;font-size:12px}
.btn-danger-soft{background:rgba(244,63,94,.1);border:1.5px solid rgba(244,63,94,.25);color:var(--red);padding:6px 11px;border-radius:var(--radius-xs);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}

/* ── Badge ──────────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}

/* ── Form ───────────────────────────────────────────────────────── */
.inp-wrap{display:flex;flex-direction:column;gap:5px}
.inp-wrap label{font-size:11.5px;color:var(--muted);font-weight:600;letter-spacing:.1px}
.inp-wrap input,.inp-wrap select,.inp-wrap textarea{
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);padding:11px 13px;
  color:var(--text);outline:none;width:100%;transition:border-color .15s
}
.inp-wrap input:focus,.inp-wrap select:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 3px var(--accent-glow)}
.inp-hint{font-size:11px;color:var(--muted);margin-top:3px}

/* ── Progress ───────────────────────────────────────────────────── */
.prog-wrap{background:var(--border);border-radius:99px;overflow:hidden}
.prog-bar{border-radius:99px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* ── Card visual ────────────────────────────────────────────────── */
.card-visual{border-radius:16px;padding:20px 22px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;user-select:none;min-height:128px}

/* ── Modal ──────────────────────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(12,14,20,.55);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.modal-box{background:var(--panel);border-radius:22px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,.22)}
@media(max-width:700px){.modal-overlay{align-items:flex-end;padding:0}.modal-box{border-radius:22px 22px 0 0;max-width:100%}}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:20px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:1}
.modal-body{padding:18px 22px 32px;display:flex;flex-direction:column;gap:15px}

/* ── Page header (for non-dashboard pages) ──────────────────────── */
.page-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.page-title{font-size:21px;font-weight:800;letter-spacing:-.4px}
.page-sub{font-size:13px;color:var(--muted);margin-top:3px}

/* ── Section title ──────────────────────────────────────────────── */
.sec-title{font-size:15px;font-weight:700;letter-spacing:-.2px}

/* ── KPI ────────────────────────────────────────────────────────── */
.kpi{padding:20px 22px}
.kpi-icon{border-radius:12px;padding:10px;display:inline-flex;margin-bottom:14px}
.kpi-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.7px}
.kpi-value{font-size:24px;font-weight:800;margin-top:5px;letter-spacing:-.6px}

/* ── List rows ──────────────────────────────────────────────────── */
.list-row{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);transition:background .12s}
.list-row:last-child{border-bottom:none}
.list-row:hover{background:var(--bg)}
.list-icon{border-radius:11px;padding:10px;display:flex;flex-shrink:0}
.list-del{background:transparent;border:1.5px solid var(--border);border-radius:var(--radius-xs);padding:6px;display:flex;color:var(--muted);transition:all .15s}
.list-del:hover{background:var(--red-lt);border-color:rgba(244,63,94,.3);color:var(--red)}
.list-edit{background:transparent;border:1.5px solid var(--border);border-radius:var(--radius-xs);padding:6px;display:flex;color:var(--muted);transition:all .15s}
.list-edit:hover{background:rgba(74,108,247,.08);border-color:rgba(74,108,247,.3);color:var(--accent)}

/* ── Alert ──────────────────────────────────────────────────────── */
.alert{padding:16px 18px;border-radius:var(--radius);display:flex;align-items:center;gap:12px;flex-wrap:wrap}

/* ── Empty state ────────────────────────────────────────────────── */
.empty{padding:56px 20px;text-align:center;color:var(--muted)}
.empty-icon{font-size:44px;margin-bottom:14px}

/* ── Scan box ───────────────────────────────────────────────────── */
.scan-box{border:2px dashed rgba(74,108,247,.3);border-radius:var(--radius);padding:16px;background:rgba(74,108,247,.03)}

/* ── Charts ─────────────────────────────────────────────────────── */
.bar-chart{display:flex;align-items:flex-end;gap:8px;height:160px}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar-pair{display:flex;align-items:flex-end;gap:3px;width:100%}
.bar-seg{border-radius:6px 6px 0 0;min-height:2px;transition:height .6s cubic-bezier(.4,0,.2,1);flex:1}
.bar-lbl{font-size:9px;color:var(--muted);text-align:center}
.donut-wrap{position:relative;display:inline-block}
.donut-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;pointer-events:none}

/* ── Toggle ─────────────────────────────────────────────────────── */
.toggle{width:42px;height:24px;border-radius:12px;border:none;position:relative;flex-shrink:0;transition:background .2s}
.toggle-knob{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}

/* ── Nav head (card view) ───────────────────────────────────────── */
.nav-head{background:var(--accent);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:20px;box-shadow:0 4px 16px var(--accent-glow)}

/* ── Invest ─────────────────────────────────────────────────────── */
.inv-accordion-btn{cursor:pointer;transition:background .15s;user-select:none}
.inv-accordion-btn:hover{filter:brightness(.97)}
.inv-filter-tab{padding:8px 16px;border-radius:10px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;white-space:nowrap}
.inv-filter-tab.active{background:var(--accent);color:#fff;box-shadow:0 3px 10px var(--accent-glow)}
.inv-filter-tab:not(.active){background:var(--panel);color:var(--muted);border:1.5px solid var(--border)}
.inv-filter-tab:not(.active):hover{border-color:var(--accent);color:var(--accent);background:rgba(74,108,247,.05)}

/* ── Invest row ─────────────────────────────────────────────────── */
.inv-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;
  border-bottom:1px solid var(--border);
  transition:background .12s;
  gap:12px;
}
.inv-row:last-child{border-bottom:none}
.inv-row:hover{background:var(--bg)}
.inv-row-left{display:flex;align-items:center;gap:14px;flex:1;min-width:0}
.inv-row-ticker{
  width:44px;height:44px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:800;flex-shrink:0;
  text-align:center;padding:3px;line-height:1.15;
}
.inv-row-info{min-width:0;flex:1}
.inv-row-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.inv-row-meta{font-size:11px;color:var(--muted);display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.inv-row-right{display:flex;align-items:center;gap:20px;flex-shrink:0}
.inv-row-col{text-align:right}
.inv-row-col-label{font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.inv-row-col-val{font-size:13px;font-weight:800;font-family:var(--mono)}
.inv-row-col-sub{font-size:11px;font-weight:700;margin-top:2px}
.inv-cotacao-loading{font-size:11px;color:var(--muted);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ── Stat pill ──────────────────────────────────────────────────── */
.stat-pill{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;font-size:12px;font-weight:700}

/* ── Dashboard widget card ──────────────────────────────────────── */
.w-card{padding:24px;border-radius:var(--radius);background:var(--panel);border:1px solid var(--border);box-shadow:var(--sh)}
.w-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.w-value{font-size:28px;font-weight:800;letter-spacing:-.7px;line-height:1.1}

/* ── Tabs (budget overview period) ─────────────────────────────── */
.tab-pill{display:flex;background:var(--bg);border-radius:10px;padding:3px;gap:2px}
.tab-pill button{padding:6px 14px;border-radius:8px;border:none;font-size:12px;font-weight:600;color:var(--muted);background:transparent;transition:all .15s}
.tab-pill button.active{background:var(--panel);color:var(--text);box-shadow:var(--sh-sm)}

/* ── Animations ─────────────────────────────────────────────────── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .9s linear infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.au{animation:fadeUp .3s cubic-bezier(.4,0,.2,1) both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── Topbar month selector ──────────────────────────────────────── */
#mob-mes{background:var(--panel);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 13px;font-size:13px;outline:none;color:var(--text);font-family:var(--font);box-shadow:var(--sh-sm);cursor:pointer}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main" id="app-main">
    <header class="topbar" id="topbar"></header>
    <div class="content au" id="main"></div>
  </div>

function derived(){
  const fR=S.receitas.filter(x=>x.data?.startsWith(S.mes));
  const fD=S.despesas.filter(x=>x.data?.startsWith(S.mes));
  const totR=fR.reduce((a,x)=>a+(+x.valor),0);
  const totD=fD.filter(x=>x.origem!=='empresa').reduce((a,x)=>a+(+x.valor),0);
  const totI=S.invest.reduce((a,x)=>a+(+x.valor),0);
  // cardFat: aceita flag para excluir empresa
  const cardFat=(id,m,excEmpresa=false)=>S.lancs.filter(x=>x.cartaoId===id&&x.mes===m&&(!excEmpresa||x.origem!=='empresa')).reduce((a,x)=>a+(+x.valor),0);
  const cardFatAll=(id,m)=>cardFat(id,m,false); // total incluindo empresa (para exibição no card)
  const totCa=S.cartoes.reduce((a,c)=>a+cardFat(c.id,S.mes,true),0); // só gastos pessoais
  const pendRe=S.lancs.filter(x=>x.reembolso&&!x.reembolsado);
  const totRe=pendRe.reduce((a,x)=>a+(+x.valor),0);
  const saldo=totR-totD-totCa; // saldo livre real: receita menos despesas diretas e fatura do cartão
  const taxaPoupanca=totR>0?(saldo/totR*100):0;
  const nextMes=(()=>{const d=new Date(S.mes+'-02');d.setMonth(d.getMonth()+1);return d.toISOString().slice(0,7);})();
  const prevMes=(()=>{const d=new Date(S.mes+'-02');d.setMonth(d.getMonth()-1);return d.toISOString().slice(0,7);})();
  const faturaVencendo=S.cartoes.reduce((a,c)=>a+cardFat(c.id,prevMes,true),0);
  const pct=v=>totR>0?(v/totR*100):0;
  // allCats: exclui empresa
  const allCats=(()=>{const m={};
    [...fD.filter(x=>x.origem!=='empresa'),...S.lancs.filter(x=>x.mes===S.mes&&x.origem!=='empresa')]
    .forEach(x=>{m[x.categoria]=(m[x.categoria]||0)+(+x.valor);});
    return Object.entries(m).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
  })();
  const hist6=Array.from({length:6},(_,i)=>{
    const d=new Date();d.setMonth(d.getMonth()-5+i);const m=d.toISOString().slice(0,7);
    const r=S.receitas.filter(x=>x.data?.startsWith(m)).reduce((a,x)=>a+(+x.valor),0);
    const de=S.despesas.filter(x=>x.data?.startsWith(m)&&x.origem!=='empresa').reduce((a,x)=>a+(+x.valor),0);
    const lanc=S.lancs.filter(x=>x.mes===m&&x.origem!=='empresa').reduce((a,x)=>a+(+x.valor),0);
    return{n:moLbl(m),Receitas:r,Despesas:de+lanc};
  });

  // ── Reserva de emergência ────────────────────────────────────────────────
  // Proxy de liquidez: ativos em Renda Fixa (ajustável pelo usuário via meses-alvo)
  const mesesComDado=hist6.filter(h=>h.Receitas>0||h.Despesas>0);
  const gastoMedioMensal=mesesComDado.length?mesesComDado.reduce((a,h)=>a+h.Despesas,0)/mesesComDado.length:(totD+totCa);
  const reservaAtual=S.invest.filter(x=>x.tipo==='Renda Fixa').reduce((a,x)=>a+(+x.valor),0);
  const reservaMesesAlvo=+S.reservaMeses||6;
  const reservaMeta=gastoMedioMensal*reservaMesesAlvo;
  const reservaPct=reservaMeta>0?Math.min(reservaAtual/reservaMeta*100,100):0;

  // ── Projeção de fluxo de caixa — próximos 6 meses ─────────────────────────
  const mesesComReceita=mesesComDado.filter(h=>h.Receitas>0);
  const receitaMediaProjetada=mesesComReceita.length
    ? mesesComReceita.reduce((a,h)=>a+h.Receitas,0)/mesesComReceita.length
    : totR;
  const recorrenteFixoMensal=fD.filter(x=>x.recorrencia==='mensal').reduce((a,x)=>a+(+x.valor),0);
  const fluxoFuturo=Array.from({length:6},(_,i)=>{
    const d=new Date(S.mes+'-02');d.setMonth(d.getMonth()+1+i);const m=d.toISOString().slice(0,7);
    const parcelasDesp=S.despesas.filter(x=>x.origem!=='empresa'&&x.data?.startsWith(m)).reduce((a,x)=>a+(+x.valor),0);
    const parcelasLanc=S.lancs.filter(x=>x.origem!=='empresa'&&x.mes===m).reduce((a,x)=>a+(+x.valor),0);
    const comprometido=parcelasDesp+parcelasLanc;
    return{n:moLbl(m),mes:m,Receitas:receitaMediaProjetada,Despesas:comprometido+recorrenteFixoMensal,comprometido,recorrenteFixoMensal};
  });
  const totalComprometido6m=fluxoFuturo.reduce((a,x)=>a+x.comprometido,0);

  return{fR,fD,totR,totD,totI,totCa,pendRe,totRe,saldo,taxaPoupanca,pct,allCats,hist6,cardFat,cardFatAll,nextMes,prevMes,faturaVencendo,
    gastoMedioMensal,reservaAtual,reservaMesesAlvo,reservaMeta,reservaPct,
    fluxoFuturo,totalComprometido6m,recorrenteFixoMensal};
}

function barChartSVG(data){
  const w=560,h=240,pb=28,pt=8,pl=52,pr=16;
  const chartH=h-pb-pt;

  // Check if there's real data
  const allVals=data.flatMap(d=>[d.Receitas||0,d.Despesas||0]).filter(v=>v>0);
  const hasData=allVals.length>0;

  // When no data: use demo proportional values so chart looks filled
  const renderData=hasData?data:data.map((d,i)=>{
    const demo=[.55,.70,.45,.80,.65,.90];
    const base=10000;
    return{...d,Receitas:base*demo[i%demo.length],Despesas:base*demo[i%demo.length]*.72,_demo:true};
  });

  // Scale: always use the actual max so bars fill the height
  const rMax=Math.max(...renderData.map(d=>Math.max(d.Receitas||0,d.Despesas||0)),1);
  // Nice ceiling
  const mag=Math.pow(10,Math.floor(Math.log10(rMax)));
  const step=rMax/mag<=2?mag*.5:rMax/mag<=5?mag:mag*2;
  const maxVal=Math.ceil(rMax/step)*step||1;

  const fmtY=v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'k':v.toFixed(0);
  const cw=(w-pl-pr)/renderData.length;
  const bw=Math.min(26,cw*.38);
  let bars='',labels='',grid='';

  // Grid lines + Y labels (5 steps)
  for(let i=0;i<=5;i++){
    const v=maxVal*i/5;
    const y=pt+chartH*(1-i/5);
    grid+=`<line x1="${pl}" y1="${y.toFixed(1)}" x2="${w-pr}" y2="${y.toFixed(1)}" stroke="#eaecf4" stroke-width="${i===0?1.5:.8}"/>`;
    grid+=`<text x="${pl-8}" y="${(y+4).toFixed(1)}" text-anchor="end" font-size="10" fill="${hasData?'#8b91a7':'#c8ccda'}" font-family="var(--font)">${hasData?fmtY(v):'—'}</text>`;
  }

  renderData.forEach((d,i)=>{
    const x=pl+i*cw+cw/2;
    const vR=d.Receitas||0, vD=d.Despesas||0;
    const hR=Math.max(chartH*(vR/maxVal),vR>0?4:0);
    const hD=Math.max(chartH*(vD/maxVal),vD>0?4:0);
    const yR=pt+chartH-hR, yD=pt+chartH-hD;
    const alpha=d._demo?'.25':'.9';
    const alphaD=d._demo?'.18':'.8';

    bars+=`<rect x="${(x-bw-2).toFixed(1)}" y="${yR.toFixed(1)}" width="${bw}" height="${Math.max(hR,1).toFixed(1)}" rx="5" fill="#22c55e" opacity="${alpha}"/>`;
    bars+=`<rect x="${(x+2).toFixed(1)}" y="${yD.toFixed(1)}" width="${bw}" height="${Math.max(hD,1).toFixed(1)}" rx="5" fill="#1e2028" opacity="${alphaD}"/>`;
    labels+=`<text x="${x.toFixed(1)}" y="${h-6}" text-anchor="middle" font-size="10" fill="#8b91a7" font-family="'Plus Jakarta Sans',sans-serif">${d.n}</text>`;
  });

  const emptyNote=!hasData?`<text x="${w/2}" y="${pt+chartH/2}" text-anchor="middle" font-size="12" fill="#c8ccda" font-family="'Plus Jakarta Sans',sans-serif">Adicione receitas e despesas para ver o gráfico</text>`:'';

  return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px">
    ${grid}${bars}${labels}${emptyNote}
    <line x1="${pl}" y1="${pt}" x2="${pl}" y2="${pt+chartH}" stroke="#eaecf4" stroke-width="1.5"/>
  </svg>`;
}

// ── Donut (SVG) ───────────────────────────────────────────────────────────────
function donutSVG(data,size=130){
  if(!data.length)return`<svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${size*.3}" fill="none" stroke="#e2e8f0" stroke-width="${size*.12}"/></svg>`;
  const total=data.reduce((a,x)=>a+x.value,0)||1;
  const r=size*.28,cx=size/2,cy=size/2,sw=size*.12;
  let offset=0,paths='';
  data.forEach((d,i)=>{
    const pct=d.value/total,angle=pct*2*Math.PI;
    const x1=cx+r*Math.sin(offset),y1=cy-r*Math.cos(offset);
    offset+=angle;
    const x2=cx+r*Math.sin(offset),y2=cy-r*Math.cos(offset);
    const large=angle>Math.PI?1:0;
    paths+=`<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${PAL[i%PAL.length]}"/>`;
  });
  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}<circle cx="${cx}" cy="${cy}" r="${r*0.72}" fill="white"/></svg>`;
}

// ── Area chart (SVG) ──────────────────────────────────────────────────────────
// Map CSS vars to hex for SVG (SVG does not support CSS custom properties in attributes)
const SVG_COLORS = {
  'var(--accent)':'#5a2fd4','var(--red)':'#dc2626','var(--green)':'#059669',
  'var(--blue)':'#2563eb','var(--orange)':'#d97706','var(--teal)':'#0891b2',
  'var(--purple)':'#7c3aed',
};
const svgColor = c => SVG_COLORS[c]||c;

function areaChartSVG(data,color,keyY='v'){
  if(!data.length)return`<div class="empty" style="padding:24px">Sem dados</div>`;
  const hex=svgColor(color);
  const w=500,h=130,pb=24,pt=10,pl=48,pr=12;
  const vals=data.map(d=>+d[keyY]||0);
  const maxVal=Math.max(...vals,1);
  const xStep=(w-pl-pr)/(data.length-1||1);
  const yScale=v=>(h-pb-pt)*(1-v/maxVal)+pt;
  const pts=data.map((d,i)=>`${pl+i*xStep},${yScale(+d[keyY]||0)}`).join(' ');
  const first=`${pl},${h-pb}`,last=`${pl+(data.length-1)*xStep},${h-pb}`;
  const id=`ag${Math.random().toString(36).slice(2,6)}`;
  let yaxis='';
  [0,.5,1].forEach(f=>{const y=yScale(maxVal*f),v=maxVal*f;yaxis+=`<text x="${pl-4}" y="${y+4}" text-anchor="end" font-size="9" fill="#6b7280">${v>=1000000?(v/1000000).toFixed(1)+'M':v>=1000?(v/1000).toFixed(0)+'k':v.toFixed(0)}</text><line x1="${pl}" y1="${y}" x2="${w-pr}" y2="${y}" stroke="#e5e7eb" stroke-width="1"/>`;});
  const xlabels=data.map((d,i)=>`<text x="${pl+i*xStep}" y="${h-5}" text-anchor="middle" font-size="9" fill="#6b7280">${d.n||d.ano||''}</text>`).join('');
  return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:${h}px;overflow:visible">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${hex}" stop-opacity="0.22"/><stop offset="100%" stop-color="${hex}" stop-opacity="0.02"/></linearGradient></defs>
    ${yaxis}
    <polygon points="${first} ${pts} ${last}" fill="url(#${id})"/>
    <polyline points="${pts}" fill="none" stroke="${hex}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${data.map((d,i)=>`<circle cx="${pl+i*xStep}" cy="${yScale(+d[keyY]||0)}" r="3" fill="${hex}" stroke="white" stroke-width="1.5"/>`).join('')}
    ${xlabels}
  </svg>`;
}

        ${[

function pageDespesas(){
  const {fD,totD,totCa,totR,saldo,pct,allCats,cardFat}=derived();
  const search  = (S.despSearch||'').toLowerCase();
  const catFilt = S.despCatFilter||'Todos';
  const tipoFilt= S.despTipoFilter||'Todos';

  // ── Build unified transactions list (despesas + lançamentos de cartão) ──────
  const lancMes = S.lancs.filter(x=>x.mes===S.mes);
  const lancPes = lancMes.filter(x=>x.origem!=='empresa');
  const lancEmp = lancMes.filter(x=>x.origem==='empresa');
  const totLanc = lancPes.reduce((a,x)=>a+(+x.valor),0);   // só pessoal
  const totLancEmp = lancEmp.reduce((a,x)=>a+(+x.valor),0);
  const totGeral = totD + totLanc;

  // Unified item list with _source tag
  const allItems = [
    ...fD.filter(x=>x.origem!=='empresa').map(x=>({...x,_source:'desp'})),
    ...lancPes.map(x=>({...x,_source:'lanc',tipo:'cartao',categoria:x.categoria||'Outros'})),
  ].sort((a,b)=>(b.data||'').localeCompare(a.data||''));

  // Empresa items (shown separately)
  const empItems = [
    ...fD.filter(x=>x.origem==='empresa').map(x=>({...x,_source:'desp'})),
    ...lancEmp.map(x=>({...x,_source:'lanc',tipo:'cartao',categoria:x.categoria||'Outros'})),
  ];

  // ── Categories dashboard (all items combined) ─────────────────────────────
  const catMap={};
  allItems.forEach(x=>{const c=x.categoria||'Outros';catMap[c]=(catMap[c]||0)+(+x.valor);});
  const cats=Object.entries(catMap).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);
  const uniqueCats=['Todos',...cats.map(c=>c.name)];

  // ── Apply filters ─────────────────────────────────────────────────────────
  let filtered = allItems.filter(x=>{
    const txt=(x.descricao||x.categoria||'').toLowerCase();
    const matchSearch = !search || txt.includes(search);
    const matchCat    = catFilt==='Todos' || x.categoria===catFilt;
    const matchTipo   = tipoFilt==='Todos' ||
                        (tipoFilt==='cartao' && x._source==='lanc') ||
                        (tipoFilt==='fixa'   && x.tipo==='fixa') ||
                        (tipoFilt==='variavel'&& x.tipo==='variavel');
    return matchSearch && matchCat && matchTipo;
  });

  const filtTotal = filtered.reduce((a,x)=>a+(+x.valor),0);
  const isFiltered = search || catFilt!=='Todos' || tipoFilt!=='Todos';

  // ── KPI cards ─────────────────────────────────────────────────────────────
  const kpis = [
    {label:'Total Pessoal',   v:totGeral, color:'var(--red)',   bg:'var(--red-lt)',   sub:`${allItems.length} lançamentos`},
    {label:'Despesas Diretas',v:totD,     color:'var(--amber)', bg:'var(--amber-lt)', sub:`${fD.filter(x=>x.origem!=='empresa').length} itens`},
    {label:'Fatura Pessoal',  v:totLanc,  color:'var(--blue)',  bg:'var(--blue-lt)',  sub:`${lancPes.length} lançamentos`},
    {label:'Empresa (fora)',  v:totLancEmp+fD.filter(x=>x.origem==='empresa').reduce((a,x)=>a+(+x.valor),0), color:'var(--muted)', bg:'var(--bg)', sub:'não entra no controle', isEmp:true},
  ];

  // ── Row item renderer ─────────────────────────────────────────────────────
  const renderItem = x => {
    const isLanc = x._source==='lanc';
    const card = isLanc ? S.cartoes.find(c=>c.id===x.cartaoId) : null;
    const col  = isLanc ? (BANK_C[card?.banco]||'var(--blue)') : x.tipo==='fixa'?'var(--amber)':'var(--purple)';
    const icon = isLanc ? ic('card',col) : ic('down',col);
    const catColor = PAL[cats.findIndex(c=>c.name===x.categoria)%PAL.length]||'var(--muted)';
    return `<div class="list-row">
      <div class="row gap-12 flex-1" style="min-width:0">
        <div style="background:${col}18;border-radius:11px;padding:9px;display:flex;flex-shrink:0">${icon}</div>
        <div style="min-width:0;flex:1">
          <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(x.descricao||x.categoria)}</div>
          <div class="row gap-6 mt-4 wrap">
            <span style="display:inline-flex;align-items:center;gap:4px;background:${catColor}18;color:${catColor};padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700">${esc(x.categoria)}</span>
            ${isLanc?`<span style="font-size:11px;color:var(--muted)">${esc(card?.nome||'Cartão')}</span>`:`<span style="font-size:11px;color:var(--muted)">${x.tipo==='fixa'?'Fixo':'Variável'}</span>`}

  return`

    ${(()=>{
      const estourado=cats.filter(c=>{const b=+S.budgets[c.name]||0;return b>0&&c.value>b;});

    ${cats.length ? `

              <span style="font-size:9px;color:var(--muted)">orçamento</span>

  <!-- ── Barra de busca + filtros ───────────────────────────────────────────── -->
  <div class="row gap-10 mb-14 wrap">

    <div style="flex:1;min-width:200px;position:relative">

      <input id="desp-search" type="text" value="${esc(S.despSearch||'')}"
        placeholder="Buscar por nome ou categoria..."
        style="width:100%;background:var(--panel);border:1.5px solid var(--border);border-radius:12px;padding:11px 13px 11px 40px;font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s"
        onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"/>

      ${['Todos','fixa','variavel','cartao'].map(t=>{

        const active=tipoFilt===t;
        return`<button data-desp-tipo="${t}" class="btn ${active?'btn-primary':'btn-ghost'} btn-sm">${labels[t]}</button>`;

    <!-- Nova despesa -->

  <div class="w-card overflow-hidden">
    <div class="row between" style="padding:16px 20px;border-bottom:1px solid var(--border)">
      <div class="sec-title">
        ${isFiltered
          ?`Resultados filtrados <span style="font-size:13px;color:var(--muted);font-weight:500">(${filtered.length} item${filtered.length!==1?'s':''})</span>`
          :`Todos os gastos <span style="font-size:13px;color:var(--muted);font-weight:500">(${allItems.length})</span>`

  <!-- ── Gastos Empresa ─────────────────────────────────────────────────────── -->
  ${empItems.length?`<div class="w-card overflow-hidden mt-14" style="border-color:rgba(59,130,246,.2)">
    <div class="row between" style="padding:16px 20px;border-bottom:1px solid var(--border);background:rgba(59,130,246,.04)">
      <div>
        <div class="sec-title" style="color:var(--blue)">🏢 Gastos Empresa</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Não entram no controle financeiro pessoal</div>
      </div>
      <span class="mono fw-800" style="color:var(--blue)">${fmt(empItems.reduce((a,x)=>a+(+x.valor),0))}</span>
    </div>
    ${empItems.map(x=>`<div class="list-row" style="background:rgba(59,130,246,.02)">
      <div class="row gap-12 flex-1" style="min-width:0">
        <div style="background:rgba(59,130,246,.1);border-radius:11px;padding:9px;display:flex;flex-shrink:0">${ic('card','var(--blue)')}</div>
        <div style="min-width:0;flex:1">
          <div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(x.descricao||x.categoria)}</div>
          <div class="row gap-6 mt-4 wrap">
            <span style="font-size:11px;color:var(--blue);font-weight:600">${esc(x.categoria)}</span>
            <span style="font-size:11px;color:var(--muted)">${esc(x.data||'')}</span>
          </div>
        </div>
      </div>
      <div class="row gap-8" style="flex-shrink:0">
        <span class="mono fw-700" style="color:var(--blue)">${fmt(x.valor)}</span>

          :`<button class="list-edit" data-edit-d="${esc(x.id)}">${ic('edit')}</button><button class="list-del" data-del-d="${esc(x.id)}">${ic('trash')}</button>`
        }
      </div>
    </div>`).join('')}

}

  const reembSection=pendRe.length?`<div class="panel mb-16" style="padding:16px;border-color:rgba(221,107,32,.4);background:var(--orange-lt)">
    <div class="row gap-8 mb-10">${ic('refund','var(--orange)')}<span style="font-weight:700;font-size:13px;color:var(--orange)">Reembolsos Pendentes · ${fmt(totRe)}</span></div>
    ${pendRe.map((l,i)=>{const card=S.cartoes.find(c=>c.id===l.cartaoId);return`<div style="padding:9px 0;border-bottom:${i<pendRe.length-1?'1px solid var(--border)':'none'};display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
      <div><div class="row gap-6" style="font-weight:600;font-size:13px">${esc(l.descricao||l.categoria)} ${badge('para '+esc(l.reembQuem||'?'),'var(--teal)')}</div><div class="text-muted">${esc(card?.nome)} · ${esc(l.data)}</div></div>
      <div class="row gap-8"><span class="mono fw-700" style="color:var(--orange)">${fmt(l.valor)}</span><button class="${btnC('green','sm')}" data-mark-re="${esc(l.id)}">${ic('check','#fff')}Recebido</button><button class="list-del" data-del-l="${esc(l.id)}">${ic('trash')}</button></div>
    </div>`;}).join('')}
  </div>`:'';
  const cards=S.cartoes.length?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px">${S.cartoes.map(card=>{
    const bc=BANK_C[card.banco]||'#718096';
    const fat=cardFat(card.id,S.mes,true);
    const fatR=fat-S.lancs.filter(x=>x.cartaoId===card.id&&x.mes===S.mes&&!x.reembolso).reduce((a,x)=>a+(+x.valor),0);
    const av=Math.max(+card.limite-fat,0),used=+card.limite>0?Math.min((fat/+card.limite)*100,100):0;
    const nL=S.lancs.filter(x=>x.cartaoId===card.id&&x.mes===S.mes).length;
    return`<div class="panel overflow-hidden" style="cursor:pointer" data-card-view="${esc(card.id)}">
      ${cardVisual(card)}
      <div style="padding:14px">
        <div class="row between mb-8"><div><div class="text-muted text-xs">Fatura ${moLbl(S.mes)}</div><div class="mono fw-800" style="font-size:19px;color:${bc}">${fmt(fat)}</div></div>${fatR>0?badge(fmt(fatR),'var(--teal)'):''}</div>
        <div class="row between text-xs mb-4" style="color:var(--muted)"><span>Usado</span><span>Disponível: ${fmt(av)}</span></div>
        <div style="background:var(--border);border-radius:4px;height:6px;overflow:hidden"><div style="background:${used>90?'var(--red)':used>70?'var(--orange)':bc};border-radius:4px;height:6px;width:${used}%;transition:width .5s"></div></div>
        <div class="row between text-xs mt-6" style="color:var(--muted)"><span>Fecha ${esc(card.fechamento)} · Vence ${esc(card.vencimento)}</span><span style="color:${bc};font-weight:600">${nL} lançamento(s)</span></div>
      </div></div>`;}).join('')}</div>`:emptyState('💳','Nenhum cartão cadastrado');
  const allLancs=S.lancs.filter(x=>x.mes===S.mes);
  const recentes=allLancs.length?`<div style="margin-top:20px"><div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Todos os lançamentos — ${moLbl(S.mes)}</div>
    <div class="panel overflow-hidden">${allLancs.sort((a,b)=>(b.data||'').localeCompare(a.data||'')).slice(0,10).map((l,i,arr)=>{
      const card=S.cartoes.find(c=>c.id===l.cartaoId),bc=BANK_C[card?.banco]||'#718096';
      return`<div class="list-row"><div class="row gap-10">${av(inits(card?.nome||'?'),bc,32)}<div>
        <div class="row gap-6 wrap" style="font-weight:600;font-size:13px">${esc(l.descricao||l.categoria)}${l.reembolso?badge(l.reembolsado?'✓ Reemb.':'⏳ Reemb.',l.reembolsado?'var(--green)':'var(--teal)'):''}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">${esc(card?.nome)} · ${esc(l.categoria)} · <span style="font-weight:600;color:var(--text)">${esc(l.data)}</span></div>
      </div></div>
      <div class="row gap-6">
        <span class="mono fw-700" style="color:${l.reembolso?(l.reembolsado?'var(--green)':'var(--teal)'):'var(--blue)'}">${fmt(l.valor)}</span>
        <button class="list-edit" data-edit-l="${esc(l.id)}">${ic('edit','var(--accent)')}</button>
        <button class="list-del" data-del-l="${esc(l.id)}">${ic('trash')}</button>
      </div></div>`;
    }).join('')}</div></div>`:'';
  return`
    <div class="page-head">
      <div class="text-xs text-muted">${S.cartoes.length} cartão(ões) · Fatura: <span class="mono fw-700" style="color:var(--blue)">${fmt(totCa)}</span></div>
      <div class="row gap-8">
        <button class="${btnC('ai')}" id="btn-import-ext" ${S.stmtScanLoad||!S.cartoes.length?'disabled':''}>${S.stmtScanLoad?ic('spin','#fff')+' Lendo extrato...':ic('camera','#fff')+'Importar Extrato com IA'}</button>
        <button class="${btnC('outline')}" data-modal="lanc" ${!S.cartoes.length?'disabled':''}>${ic('plus','var(--accent)')}Lançar</button>
        <button class="${btnC('primary')}" data-modal="cartao">${ic('plus','#fff')}Novo Cartão</button>
      </div>
    </div>
    ${S.stmtScanErr?`<div class="panel mb-16" style="padding:12px 16px;border-color:rgba(245,158,11,.3);background:var(--amber-lt);font-size:12px;color:var(--amber);font-weight:600">⚠️ ${esc(S.stmtScanErr)}</div>`:''}
    ${!S.cartoes.length?`<div class="text-xs text-muted mb-16">Cadastre um cartão para poder importar extratos.</div>`:''}
    ${reembSection}${cards}${recentes}`;
}

function pageCardView(){
  const card=S.cartoes.find(c=>c.id===S.cardView);if(!card)return'';
  const bc=BANK_C[card.banco]||'#718096';
  const cardL=S.lancs.filter(x=>x.cartaoId===S.cardView&&x.mes===S.mes).sort((a,b)=>(b.data||'').localeCompare(a.data||''));
  const pessoalL=cardL.filter(x=>x.origem!=='empresa');
  const empresaL=cardL.filter(x=>x.origem==='empresa');
  const fatTot=cardL.reduce((a,x)=>a+(+x.valor),0);
  const fatPes=pessoalL.reduce((a,x)=>a+(+x.valor),0);
  const fatEmp=empresaL.reduce((a,x)=>a+(+x.valor),0);
  const fatOwn=pessoalL.filter(x=>!x.reembolso).reduce((a,x)=>a+(+x.valor),0);
  const fatRe2=fatPes-fatOwn;
  const avail=Math.max(+card.limite-fatTot,0);
  const usedPct=+card.limite>0?Math.min((fatTot/+card.limite)*100,100):0;

  // Categories — pessoal only for personal dashboard
  const catMap={};
  pessoalL.forEach(x=>{catMap[x.categoria]=(catMap[x.categoria]||0)+(+x.valor);});
  const cardCats=Object.entries(catMap).map(([name,value])=>({name,value})).sort((a,b)=>b.value-a.value);

  const cardEvol=(()=>{const m={};pessoalL.forEach(x=>{const d=x.data||'';m[d]=(m[d]||0)+(+x.valor);});return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])).map(([d,v])=>({n:d.slice(5),v}));})();

  // Donut SVG inline — clean arc-style
  const donutCat=(data,sz=160)=>{
    if(!data.length)return`<svg width="${sz}" height="${sz}"><circle cx="${sz/2}" cy="${sz/2}" r="${sz*.35}" fill="none" stroke="var(--border)" stroke-width="${sz*.1}"/></svg>`;
    const total=data.reduce((a,x)=>a+x.value,0)||1;
    const cx=sz/2,cy=sz/2,r=sz*.36,sw=sz*.11;
    let offset=-Math.PI/2,paths='';
    data.forEach((d,i)=>{
      const pct=d.value/total,angle=pct*2*Math.PI;
      const x1=cx+r*Math.cos(offset),y1=cy+r*Math.sin(offset);
      offset+=angle;
      const x2=cx+r*Math.cos(offset),y2=cy+r*Math.sin(offset);
      const large=angle>Math.PI?1:0;
      paths+=`<path d="M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}" fill="none" stroke="${PAL[i%PAL.length]}" stroke-width="${sw}" stroke-linecap="butt"/>`;
    });
    return`<svg width="${sz}" height="${sz}" viewBox="0 0 ${sz} ${sz}">${paths}</svg>`;
  };

  return`
    <div class="nav-head">
      <button style="background:rgba(255,255,255,.15);border:none;border-radius:9px;padding:8px;display:flex" data-back>${ic('back')}</button>
      <span style="color:#fff;font-weight:700;font-size:15px">Detalhes do Cartão</span>
      <div class="row gap-6" style="margin-left:auto">
        <button class="btn btn-ghost btn-sm" style="color:#fff;border-color:rgba(255,255,255,.3)" data-modal="lanc" data-lanc-card="${esc(S.cardView)}">${ic('plus','#fff')}Lançar</button>
        <button class="btn-danger-soft" data-del-card="${esc(card.id)}">${ic('trash','#f08080')}Excluir</button>
      </div>
    </div>

    ${cardVisual(card)}

    <!-- ── Totais do cartão ─────────────────────────────────────────────── -->
    <div class="w-card mt-12">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">
        ${[
          {l:'Total da Fatura',v:fatTot,c:bc},
          {l:'Pessoal',v:fatPes,c:'var(--red)'},
          {l:'Empresa',v:fatEmp,c:'var(--blue)'},
        ].map(x=>`<div style="text-align:center;padding:14px;background:var(--bg);border-radius:12px;border:1px solid var(--border)">
          <div style="font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;margin-bottom:6px;text-transform:uppercase">${x.l}</div>
          <div class="mono fw-800" style="font-size:17px;color:${x.c}">${fmt(x.v)}</div>
        </div>`).join('')}
      </div>
      ${progH(fatTot,+card.limite||1,usedPct>.9?'var(--red)':usedPct>.7?'var(--amber)':bc,8)}
      <div class="row between mt-8" style="font-size:11px;color:var(--muted)">
        <span>${fmtP(usedPct)} do limite usado</span>
        <span>Disponível: <span class="mono fw-600" style="color:${avail>0?'var(--green)':'var(--red)'}">${fmt(avail)}</span></span>
      </div>
      ${divider}
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${[{l:'Banco',v:card.banco},{l:'Fecha',v:'Dia '+card.fechamento},{l:'Vence',v:'Dia '+card.vencimento}].map(x=>`
          <div style="background:var(--bg);border-radius:10px;padding:10px 12px">
            <div style="font-size:10px;color:var(--muted);font-weight:600;margin-bottom:4px">${x.l}</div>
            <div style="font-weight:700;font-size:13px">${esc(x.v)}</div>
          </div>`).join('')}
      </div>

function pageInvest(){
  const {totI,saldo}=derived();
  if(!S.investCollapsed) S.investCollapsed={};
  const filter  = S.investFilter||'Todos';
  const sortBy  = S.investSort||'valor';
  const search  = (S.investSearch||'').toLowerCase();
  const retFilter = S.investRetFilter||null;
  const canIA   = !S.aiLoad&&S.invest.length&&S.apiKey;

  // ── Fundos merge into Renda Fixa ──────────────────────────────────────
  // Normalize: treat 'Fundos' as sub-class of 'Renda Fixa' for display
  const getRfItems = () => S.invest.filter(x=>x.tipo==='Renda Fixa'||x.tipo==='Fundos');
  const byTipo = {};
  // Special grouped keys
  const GROUP_KEYS = ['Renda Fixa & Fundos','Ações','FIIs','ETFs & Internacional','Cripto','Previdência','Imóveis'];
  const getGroupItems = (key) => {
    if(key==='Renda Fixa & Fundos') return S.invest.filter(x=>x.tipo==='Renda Fixa'||x.tipo==='Fundos');
    if(key==='ETFs & Internacional') return S.invest.filter(x=>x.tipo==='ETFs'||x.tipo==='Internacional');
    return S.invest.filter(x=>x.tipo===key);
  };
  const activeGroups = GROUP_KEYS.filter(k=>getGroupItems(k).length>0);

  // ── Filter tabs ────────────────────────────────────────────────────────
  const FILTER_TABS = ['Todos','Ações','FIIs','Renda Fixa & Fundos','ETFs & Internacional','Cripto'];
  const filterItems = (f) => {
    if(f==='Todos') return [...S.invest];
    return getGroupItems(f);
  };
  let items = filterItems(filter);
  if(retFilter==='alta')  items = items.filter(x=>+x.retorno>=0);
  if(retFilter==='baixa') items = items.filter(x=>+x.retorno<0);
  if(search) items = items.filter(x=>(x.nome||x.subtipo||'').toLowerCase().includes(search));
  if(sortBy==='valor')   items.sort((a,b)=>b.valor-a.valor);
  if(sortBy==='retorno') items.sort((a,b)=>+b.retorno - +a.retorno);
  if(sortBy==='nome')    items.sort((a,b)=>(a.nome||'').localeCompare(b.nome||''));

  // ── Stats ──────────────────────────────────────────────────────────────
  const totPos = S.invest.filter(x=>+x.retorno>=0).reduce((a,x)=>a+(+x.valor),0);
  const totNeg = S.invest.filter(x=>+x.retorno<0).reduce((a,x)=>a+(+x.valor),0);
  const avgRet = totI>0 ? S.invest.reduce((a,x)=>a+(+x.retorno)*(+x.valor),0)/totI : 0;

  // ── Preço médio / custo ────────────────────────────────────────────────
  const totCusto = S.invest.reduce((a,x)=>a+(+x.custoAquisicao||+x.valor),0);
  const ganho = totI - totCusto;
  const ganhoP = totCusto>0 ? (ganho/totCusto)*100 : 0;

  // ── Vencimentos próximos (30 dias) ─────────────────────────────────────
  const todayMs = Date.now();
  const vencAlertas = S.invest.filter(x=>x.vencimento).map(x=>{
    const diff = Math.round((new Date(x.vencimento)-todayMs)/(1000*60*60*24));
    return{...x, diasParaVenc:diff};
  }).filter(x=>x.diasParaVenc<=60).sort((a,b)=>a.diasParaVenc-b.diasParaVenc);

  // ── Aporte mensal + projeção personalizada ─────────────────────────────
  const aporteMes = +S.investAporte || S.invest.reduce((a,x)=>a+(+x.aporteMensal||0),0);
  const rate = avgRet/100;
  const rateM = Math.pow(1+rate,1/12)-1;
  const proj10 = Array.from({length:11},(_,y)=>({
    ano:y===0?'Hoje':`${y}a`,
    valor: Math.round(
      totI*Math.pow(1+(rate||0.10),y) +
      (aporteMes>0 && rateM>0
        ? aporteMes*12*(Math.pow(1+(rate||0.10),y)-1)/(rate||0.10)
        : aporteMes*12*y)
    )

  // ── Histórico de patrimônio ─────────────────────────────────────────────
  const hist = [...(S.investHistorico||[])].sort((a,b)=>a.data.localeCompare(b.data));

  // ── Metas por classe ───────────────────────────────────────────────────
  const metas = S.investMetas || {};

    {name:'FIIs',                tipos:['FIIs']},
    {name:'ETFs & Int\'l',       tipos:['ETFs','Internacional']},
    {name:'Cripto',              tipos:['Cripto']},

  // ── Donut SVG ──────────────────────────────────────────────────────────
  const donutSz=148,dcx=donutSz/2,dcy=donutSz/2,dr=donutSz*.34,dsw=donutSz*.13;

    const x1=dcx+dr*Math.cos(dOffset),y1=dcy+dr*Math.sin(dOffset);
    dOffset+=angle;
    const x2=dcx+dr*Math.cos(dOffset),y2=dcy+dr*Math.sin(dOffset);
    const lg=angle>Math.PI?1:0;
    dPaths+=`<path d="M${x1.toFixed(1)} ${y1.toFixed(1)} A${dr} ${dr} 0 ${lg} 1 ${x2.toFixed(1)} ${y2.toFixed(1)}" fill="none" stroke="${d.color}" stroke-width="${dsw}" stroke-linecap="butt"/>`;
  });
  const donutSVG=`<svg width="${donutSz}" height="${donutSz}" viewBox="0 0 ${donutSz} ${donutSz}" style="flex-shrink:0"><circle cx="${dcx}" cy="${dcy}" r="${dr}" fill="none" stroke="var(--border)" stroke-width="${dsw}"/>${dPaths}</svg>`;

  // ── Group color helper ─────────────────────────────────────────────────
  const groupColor = k => {
    const idx = donutData.findIndex(d=>d.name.startsWith(k.split(' ')[0]));
    return idx>=0?donutData[idx].color:PAL[0];
  };
  const gColors={'Renda Fixa & Fundos':PAL[0],'Ações':PAL[1],'FIIs':PAL[2],'ETFs & Internacional':PAL[3],'Cripto':PAL[4],'Previdência':PAL[5],'Imóveis':PAL[6]};

function extractTicker(nome){
  if(!nome) return null;
  const n = nome.trim();
  // Formato direto: "VALE3", "MXRF11", "BIL", "KO"
  if(/^[A-Z]{2,6}\d{0,2}$/.test(n)) return n;
  // Formato "Nome (TICKER)" — com ou sem dígito
  const m = n.match(/\(([A-Z]{2,6}\d{0,2})\)/);
  if(m) return m[1];
  // Primeira palavra antes de espaço, hífen, ou travessão — ex: "AMZN – Amazon", "BIL – T-Bill"
  const first = n.split(/[\s\u2013\u2014\-]/)[0];
  if(/^[A-Z]{2,6}\d{0,2}$/.test(first)) return first;
  return null;
}

function investRow(inv,col){
  const ret=+inv.retorno, retColor=ret>=0?'var(--green)':'var(--red)', retSign=ret>=0?'▲':'▼';
  const ticker=inv.nome?.length<=6?inv.nome:(inv.nome?.split(' ')?.[0]||inv.subtipo?.split(' ')?.[0]||'');
  // Custo & ganho
  const custo=+inv.custoAquisicao;
  const ganhoAtivo=custo>0?(+inv.valor-custo):0;
  const ganhoP=custo>0?(ganhoAtivo/custo*100):0;
  // Vencimento badge
  let vencBadge='';
  if(inv.vencimento){
    const dias=Math.round((new Date(inv.vencimento)-Date.now())/(1000*60*60*24));
    const cor=dias<0?'var(--red)':dias<=30?'var(--amber)':dias<=60?'var(--blue)':'var(--muted)';
    const lbl=dias<0?'Vencido':dias===0?'Hoje':dias===1?'Amanhã':`${dias}d`;
    vencBadge=`<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:${cor}1a;color:${cor};border:1px solid ${cor}30">⏰ ${lbl}</span>`;
  }
  // Cotacao slot — só para ações/FIIs/ETFs com ticker detectável
  const tickerDetected = extractTicker(inv.nome||'');
  const hasCot = !!tickerDetected && ['Ações','FIIs','ETFs','Internacional'].includes(inv.tipo);
  const cotId = `cot-${inv.id}`;
  const cotSlot = hasCot
    ? `<div class="inv-row-col" id="${cotId}">
        <div class="inv-row-col-label">Cotação</div>
        ${S.apiKey
          ? `<div class="inv-cotacao-loading">—</div>`
          : `<div style="font-size:10px;color:var(--muted)">cfg ⚙️</div>`}
      </div>`
    : '';
  // Ganho vs Proj
  const extraCol = custo>0
    ? `<div class="inv-row-col hide-mobile">
        <div class="inv-row-col-label">Ganho</div>
        <div class="inv-row-col-val" style="color:${ganhoAtivo>=0?'var(--green)':'var(--red)'}">${ganhoAtivo>=0?'+':''}${fmt(ganhoAtivo)}</div>
        <div class="inv-row-col-sub" style="color:${ganhoAtivo>=0?'var(--green)':'var(--red)'}">${ganhoP>=0?'▲':'▼'}${Math.abs(ganhoP).toFixed(1)}%</div>
      </div>`
    : `<div class="inv-row-col hide-mobile">
        <div class="inv-row-col-label">Proj. 5a</div>
        <div class="inv-row-col-val" style="color:${col}">${fmt(Math.round(+inv.valor*Math.pow(1+ret/100,5)))}</div>
      </div>`;

  return`<div class="inv-row">
    <div class="inv-row-left">
      <div class="inv-row-ticker" style="background:${col}18;border:1.5px solid ${col}30;color:${col}">${esc((ticker||'?').slice(0,6))}</div>
      <div class="inv-row-info">
        <div class="inv-row-name">${esc(inv.nome||inv.subtipo)}</div>
        <div class="inv-row-meta">
          <span>${esc(inv.subtipo)}${inv.qtd?` · ${inv.qtd} un.`:''}</span>
          ${inv.precoMedio?`<span style="padding:1px 7px;border-radius:20px;background:var(--border);font-size:10px">PM: ${fmt(inv.precoMedio)}</span>`:''}
          ${vencBadge}
          ${inv.aporteMensal&&+inv.aporteMensal>0?`<span style="padding:2px 7px;border-radius:20px;background:var(--accent-lt);color:var(--accent);font-size:10px;font-weight:700;border:1px solid rgba(90,47,212,.15)">+${fmt(inv.aporteMensal)}/mês</span>`:''}
        </div>
      </div>
    </div>
    <div class="inv-row-right">
      ${cotSlot}
      ${extraCol}
      <div class="inv-row-col">
        <div class="inv-row-col-label">Posição</div>
        <div class="inv-row-col-val">${fmt(inv.valor)}</div>
        <div class="inv-row-col-sub" style="color:${retColor}">${retSign} ${Math.abs(ret).toFixed(1)}% a.a.</div>
      </div>
      <div style="display:flex;gap:4px;align-items:center;padding-left:4px;border-left:1px solid var(--border)">
        <button class="list-edit" data-edit-i="${esc(inv.id)}">${ic('edit','var(--accent)')}</button>
        <button class="list-del" data-del-i="${esc(inv.id)}">${ic('trash')}</button>
      </div>
    </div>
  </div>`;
}

    body=`<h3>Novo Investimento</h3>
      <div class="scan-box"><div class="row gap-10">${S.scanLoad?`<div>${ic('spin','var(--accent)')}</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--accent)">Analisando...</div></div>`:`<div style="background:var(--accent-lt);border-radius:9px;padding:8px;display:flex">${ic('sparkle','var(--accent)')}</div><div style="flex:1"><div style="font-size:13px;font-weight:700;color:var(--accent)">Preencher com IA</div><div class="text-muted text-xs">Print do extrato</div></div><button class="${btnC('ai','sm')}" id="btn-scan-invest">${ic('camera','#fff')}Escanear</button>`}</div>${scanState}${S.scanErr?`<div style="font-size:12px;color:var(--orange);margin-top:8px">${S.scanErr}</div>`:''}</div>
      ${inp('Nome (opcional)','nome','text',f.nome||'','Ex: CDB Nubank, PETR4...')}
      <div class="grid-2" style="display:grid;gap:12px">${sel('Tipo','tipo',INV_T,f.tipo||INV_T[0])}${sel('Subtipo','subtipo',INV_S[f.tipo||'Renda Fixa']||[],f.subtipo||'')}</div>
      ${inp('Valor Atual (R$)','valor','number',f.valor||'','0,00')}
      <div class="grid-2" style="display:grid;gap:12px">${inp('Custo de Aquisição (R$)','custoAquisicao','number',f.custoAquisicao||'','Valor pago total')}${inp('Preço Médio (R$)','precoMedio','number',f.precoMedio||'','opcional')}</div>
      <div class="grid-2" style="display:grid;gap:12px">${inp('Retorno % a.a.','retorno','number',f.retorno||'','12')}${inp('Meta (R$)','meta','number',f.meta||'','opcional')}</div>
      <div class="grid-2" style="display:grid;gap:12px">${inp('Data de início','dataInicio','date',f.dataInicio||today())}${inp('Vencimento','vencimento','date',f.vencimento||'','opcional')}</div>
      ${inp('Aporte mensal planejado (R$)','aporteMensal','number',f.aporteMensal||'','opcional')}`;
  } else if(S.modal==='sync'){
    const total=S.receitas.length+S.despesas.length+S.lancs.length+S.invest.length;
    body=`<h3>Exportar / Importar</h3>
      <div style="background:rgba(108,63,199,.07);border:1px solid rgba(108,63,199,.2);border-radius:11px;padding:14px"><div style="font-weight:700;font-size:13px;color:var(--accent);margin-bottom:6px">📱 Sync PC ↔ Celular</div><div style="font-size:12px;color:var(--muted);line-height:1.7">1. <b>Exporte</b> aqui → salve no Google Drive / iCloud<br>2. No outro aparelho, abra o app e <b>Importe</b></div></div>
      <div class="grid-2" style="display:grid;gap:12px">
        <button id="btn-export" style="padding:16px;border-radius:11px;border:1px solid var(--border);background:var(--panel);display:flex;flex-direction:column;align-items:center;gap:8px"><div style="color:var(--accent)">${ic('download','var(--accent)').replace('16','24').replace('16','24')}</div><div style="font-weight:700;font-size:13px;color:var(--accent)">Exportar</div><div style="font-size:11px;color:var(--muted);text-align:center">${total} registros</div></button>
        <button id="btn-import-trigger" style="padding:16px;border-radius:11px;border:1px solid var(--border);background:var(--panel);display:flex;flex-direction:column;align-items:center;gap:8px"><div style="color:var(--green)">${ic('upload','var(--green)').replace('16','24').replace('16','24')}</div><div style="font-weight:700;font-size:13px;color:var(--green)">Importar</div><div style="font-size:11px;color:var(--muted);text-align:center">Restaurar JSON</div></button>
      </div>
      <input type="file" id="import-file" accept=".json" style="display:none"/>
      ${S.syncMsg?`<div style="text-align:center;padding:10px;border-radius:9px;font-weight:600;font-size:13px;background:${S.syncMsg.startsWith('✅')?'var(--green-lt)':'var(--red-lt)'};color:${S.syncMsg.startsWith('✅')?'var(--green)':'var(--red)'}">${S.syncMsg}</div>`:''}`;
  } else if(S.modal==='config'){
    body=`<h3>⚙️ Configurações</h3>
      <div style="background:var(--accent-lt);border:1px solid rgba(108,63,199,.25);border-radius:11px;padding:14px"><div style="font-weight:700;font-size:13px;color:var(--accent);margin-bottom:6px">🤖 API Key da Anthropic</div><div style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:10px">Necessária para leitura de prints e análise IA. Crie em <b>console.anthropic.com</b> → API Keys.</div>${inp('Sua API Key','apiKey','password',S.apiKey,'sk-ant-...')}${S.apiKey?`<div style="font-size:12px;color:var(--green);margin-top:6px;font-weight:600">✅ API Key salva</div>`:''}</div>`;
  }

  const hasSubmit=['receita','despesa','cartao','lanc','invest'].includes(S.modal);
  document.getElementById('modal-root').innerHTML=`
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-box">
        <div class="modal-head">
        <div>
          <div style="font-weight:700;font-size:16px">${S.editId?'✏️ Editar '+(S.modal==='receita'?'Receita':S.modal==='despesa'?'Despesa':S.modal==='lanc'?'Lançamento':S.modal==='invest'?'Investimento':''):(S.modal==='receita'?'Nova Receita':S.modal==='despesa'?'Nova Despesa':S.modal==='cartao'?'Novo Cartão':S.modal==='lanc'?'Lançar no Cartão':S.modal==='invest'?'Novo Investimento':S.modal==='sync'?'Exportar / Importar':S.modal==='config'?'Configurações':'')}</div>
          ${['receita','despesa','lanc'].includes(S.modal)&&S.form.origem?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${S.form.origem==='empresa'?'🏢 Lançamento Empresa':'👤 Lançamento Pessoal'}</div>`:''}
        </div>
        <button id="btn-close-modal" style="background:none;border:none;color:var(--muted);padding:4px;display:flex">${ic('x')}</button>
      </div>
        <div class="modal-body">
          ${body}
          ${hasSubmit?`<div class="row gap-8" style="margin-top:4px"><button class="${btnC('ghost')}" id="btn-cancel" style="flex:1;justify-content:center">Cancelar</button><button class="${btnC('primary')}" id="btn-submit" style="flex:1;justify-content:center">${S.editId?'💾 Atualizar':'Salvar'}</button></div>`:''}
          ${S.modal==='config'?`<button class="${btnC('primary')}" id="btn-cancel" style="width:100%;justify-content:center">Fechar</button>`:''}
        </div>
      </div>
    </div>`;
}

// ── Render ────────────────────────────────────────────────────────────────────
// ── Page titles config ────────────────────────────────────────────────────────
const PAGE_META={
  dashboard:{title:'Seu Dashboard Financeiro',sub:'Bem-vindo de volta'},
  receitas:  {title:'Receitas',sub:'Entradas e rendimentos'},
  despesas:  {title:'Despesas',sub:'Gastos e compromissos'},
  cartoes:   {title:'Cartões de Crédito',sub:'Faturas e lançamentos'},
  invest:    {title:'Investimentos',sub:'Carteira e patrimônio'},
};

function renderTopbar(){
  const tab=S.cardView?'cartoes':S.tab;
  const meta=PAGE_META[tab]||PAGE_META.dashboard;
  document.getElementById('topbar').innerHTML=`
    <div class="topbar-left">
      <div class="page-title">${meta.title}</div>
      <div class="page-sub">${meta.sub} · ${moLbl(S.mes)}</div>
    </div>
    <div class="topbar-right">
      <div class="topbar-icon">${ic('search','var(--muted)')}</div>
      <div class="topbar-icon">${ic('bell','var(--muted)')}</div>
      <select id="mob-mes" class="topbar-rate">${monthOptions()}</select>
    </div>`;
}

function render(){
  renderSidebar();
  renderMobileNav();
  renderTopbar();
  const main=document.getElementById('main');
  main.className='au';
  if(S.tab==='dashboard')      main.innerHTML=pageDashboard();
  else if(S.tab==='receitas')  main.innerHTML=pageReceitas();
  else if(S.tab==='despesas')  main.innerHTML=pageDespesas();
  else if(S.tab==='cartoes'&&S.cardView) main.innerHTML=pageCardView();
  else if(S.tab==='cartoes')   main.innerHTML=pageCartoes();
  else if(S.tab==='invest')    main.innerHTML=pageInvest();
  renderModal();
  if(S.importRows.length) renderImportModal();
  bindEvents();
  if(S.tab==='invest') fetchCotacoes();
}

// ── Events ────────────────────────────────────────────────────────────────────
function bindEvents(){
  // Sidebar + mobile nav tabs
  document.querySelectorAll('[data-tab]').forEach(el=>el.addEventListener('click',()=>{setState({tab:el.dataset.tab,cardView:null});}));
  // Modal open
  document.querySelectorAll('[data-modal]').forEach(el=>el.addEventListener('click',()=>openModal(el.dataset.modal)));
  // Sidebar mes
  const sbMes=document.getElementById('sb-mes');
  if(sbMes)sbMes.addEventListener('change',e=>setState({mes:e.target.value}));
  const mobMes=document.getElementById('mob-mes');
  if(mobMes)mobMes.addEventListener('change',e=>setState({mes:e.target.value}));
  // Card view
  document.querySelectorAll('[data-card-view]').forEach(el=>el.addEventListener('click',()=>setState({cardView:el.dataset.cardView})));
  // Back
  document.querySelectorAll('[data-back]').forEach(el=>el.addEventListener('click',()=>setState({cardView:null})));
  // Delete
  document.querySelectorAll('[data-del-r]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();S.receitas=S.receitas.filter(x=>x.id!==el.dataset.delR);save();render();}));
  document.querySelectorAll('[data-del-d]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();S.despesas=S.despesas.filter(x=>x.id!==el.dataset.delD);save();render();}));
  document.querySelectorAll('[data-del-l]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();S.lancs=S.lancs.filter(x=>x.id!==el.dataset.delL);save();render();}));
  document.querySelectorAll('[data-del-i]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();S.invest=S.invest.filter(x=>x.id!==el.dataset.delI);save();render();}));
  document.querySelectorAll('[data-del-card]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();if(confirm('Excluir cartão e lançamentos?')){S.cartoes=S.cartoes.filter(x=>x.id!==el.dataset.delCard);S.lancs=S.lancs.filter(x=>x.cartaoId!==el.dataset.delCard);save();setState({cardView:null});}}));
  // Edit handlers
  document.querySelectorAll('[data-edit-r]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const item=S.receitas.find(x=>x.id===el.dataset.editR);if(item)openEdit('receita',item);}));
  document.querySelectorAll('[data-edit-d]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const item=S.despesas.find(x=>x.id===el.dataset.editD);if(item)openEdit('despesa',item);}));
  document.querySelectorAll('[data-edit-l]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const item=S.lancs.find(x=>x.id===el.dataset.editL);if(item)openEdit('lanc',item);}));
  document.querySelectorAll('[data-edit-i]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const item=S.invest.find(x=>x.id===el.dataset.editI);if(item)openEdit('invest',item);}));
  // Mark reembolso
  document.querySelectorAll('[data-mark-re]').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();const id=el.dataset.markRe;S.lancs=S.lancs.map(x=>x.id===id?{...x,reembolsado:true,reembolsadoEm:today()}:x);save();render();}));
  // Modal close
  const closeModal=()=>setState({modal:null,editId:null,scanImg:null,scanErr:'',scanLoad:false});
  const btnClose=document.getElementById('btn-close-modal');if(btnClose)btnClose.addEventListener('click',closeModal);
  const btnCancel=document.getElementById('btn-cancel');if(btnCancel)btnCancel.addEventListener('click',closeModal);
  const overlay=document.getElementById('modal-overlay');if(overlay)overlay.addEventListener('click',e=>{if(e.target===overlay)closeModal();});
  // Submit
  const btnSubmit=document.getElementById('btn-submit');
  if(btnSubmit)btnSubmit.addEventListener('click',submitModal);
  // Modal form changes
  const mbox=document.querySelector('.modal-box');
  if(mbox){
    mbox.addEventListener('input',e=>{
      const n=e.target.name;
      if(!n) return;
      S.form={...S.form,[n]:e.target.value};
      // Only re-render when visual structure needs to change (not on typing)
      // restoreFocus: refoca o campo depois do render() e tenta restaurar o cursor
      // (setSelectionRange não é suportado em <input type="number">, por isso o try/catch)
      const restoreFocus=(name,pos)=>{
        const el=document.querySelector(`[name="${name}"]`);
        if(!el) return;
        el.focus();
        try{ el.setSelectionRange(pos,pos); }catch{}
      };
      if(n==='banco'||n==='bandeira') render();
      else if(n==='nome'&&S.modal==='cartao'){
        const pos=e.target.selectionStart;
        render();
        restoreFocus('nome',pos);
      }
      else if(n==='apiKey'){LS.set('mf6-key',e.target.value);S.apiKey=e.target.value;}
      else if(n==='parcelas'){
        // Re-render apenas quando parcelas muda (muda a seção de recorrência), preservando o foco
        if(S.modal==='despesa'){
          const pos=e.target.selectionStart;
          render();
          restoreFocus('parcelas',pos);
        }
      }
      else if(n==='valor'){
        // Atualiza o hint de parcelamento sem re-renderizar o modal inteiro
        const hint=document.querySelector('[data-parcelashint]');
        if(hint){
          const v=+S.form.valor, p=+S.form.parcelas||1;
          hint.textContent=(v&&p>1)?`${p}x de ${fmt(v/p)}`:'';
        }
        // Atualiza o texto de preview inline de parcelas se existir
        const pDisp=document.querySelector('[data-parcelas-display]');
        if(pDisp){
          const v=+e.target.value, p=+S.form.parcelas||1;
          pDisp.textContent=(v&&p>1)?`${p}× de ${fmt(v/p)}`:'Sem parcelamento';
        }
      }
    });
    mbox.addEventListener('change',e=>{
      const n=e.target.name;
      if(!n) return;
      S.form={...S.form,[n]:e.target.value};
      if(n==='tipo'&&S.modal==='invest'){setState({form:{...S.form,subtipo:(INV_S[e.target.value]||[])[0]||''}});}
      else if(n==='tipo'&&S.modal==='despesa'){setState({form:{...S.form,categoria:(S.form.tipo==='fixa'?CAT_FIX:CAT_VAR)[0]}});}
    });
    // Toggle reembolso
    const toggleReemb=document.getElementById('toggle-reemb');
    if(toggleReemb)toggleReemb.addEventListener('click',()=>{setState({form:{...S.form,reembolso:!S.form.reembolso}});});
    // Custom category: "+ Nova categoria" button
    mbox.querySelectorAll('[data-addcat]').forEach(btn => {
      btn.addEventListener('click', () => {
        const name   = btn.dataset.addcat;
        const boxId  = `ncb-${name}`;
        const box    = document.getElementById(boxId);

function submitModal(){
  const f=S.form, modal=S.modal, editId=S.editId;

  if(modal==='cartao'){
    if(!f.nome) return;
    if(editId){
      S.cartoes=S.cartoes.map(c=>c.id===editId?{...c,...f,id:editId}:c);
    } else {
      S.cartoes=[...S.cartoes,{...f,id:uid()}];
    }
  } else {
    if(!f.valor||+f.valor<=0) return;
    const updated={...f,valor:+f.valor};
    if(editId){
      // Update existing
      if(modal==='receita') S.receitas=S.receitas.map(x=>x.id===editId?{...x,...updated}:x);
      else if(modal==='despesa') S.despesas=S.despesas.map(x=>x.id===editId?{...x,...updated}:x);
      else if(modal==='lanc') S.lancs=S.lancs.map(x=>x.id===editId?{...x,...updated}:x);
      else if(modal==='invest') S.invest=S.invest.map(x=>x.id===editId?{...x,...updated}:x);
    } else {
      // Create new
      const e={...updated,id:uid()};
      if(modal==='receita') S.receitas=[e,...S.receitas];
      else if(modal==='despesa'){
        const parcelas=Math.max(1,Math.min(60,+updated.parcelas||1));
        const recorrencia=updated.recorrencia||'nenhuma';
        if(parcelas>1){
          // Lança cada parcela no mês correto
          const baseDate=new Date(updated.data||today());
          for(let i=0;i<parcelas;i++){
            const d=new Date(baseDate);
            d.setMonth(d.getMonth()+i);
            const dateStr=d.toISOString().slice(0,10);
            S.despesas=[{...updated,id:uid(),data:dateStr,
              descricao:`${updated.descricao||updated.categoria} (${i+1}/${parcelas})`,
              valor:+(+updated.valor/parcelas).toFixed(2),
              parcelas:String(parcelas),recorrencia:'nenhuma'
            },...S.despesas];
          }
        } else {
          S.despesas=[{...e,recorrencia},...S.despesas];
        }
      }
      else if(modal==='lanc'){if(!e.cartaoId)return; S.lancs=[e,...S.lancs];}
      else if(modal==='invest') S.invest=[e,...S.invest];
    }
  }
  save(); setState({modal:null,editId:null,scanImg:null,scanErr:''});
}

// ── Cotações em tempo real ────────────────────────────────────────────────────
async function fetchCotacoes(){
  const ativos = S.invest.filter(x=>['Ações','FIIs','ETFs','Internacional'].includes(x.tipo));
  if(!ativos.length) return;

  const tickerMap = {};
  ativos.forEach(x=>{
    const t = extractTicker(x.nome||'');
    if(!t) return;
    if(!tickerMap[t]) tickerMap[t]=[];
    tickerMap[t].push(x.id);
  });
  const tickers = Object.keys(tickerMap);
  if(!tickers.length) return;

  // Loading em todos os slots
  tickers.forEach(t=>(tickerMap[t]||[]).forEach(id=>{
    const el=document.getElementById(`cot-${id}`);
    if(el) el.innerHTML=`<div class="inv-row-col-label">Cotação</div><div class="inv-cotacao-loading" style="font-size:12px">buscando...</div>`;
  }));

  // ── Via Google Apps Script (server-side, sem CORS) ──────────────────────
  if(typeof google !== 'undefined' && google.script){
    google.script.run
      .withSuccessHandler(raw=>{
        try{
          const cotacoes = JSON.parse(raw||'{}');
          aplicarCotacoes(cotacoes, tickerMap, tickers);
        } catch{ ocultarCotacoes(tickerMap, tickers); }
      })
      .withFailureHandler(()=>ocultarCotacoes(tickerMap, tickers))
      .getCotacoes(tickers.slice(0,20));
    return;
  }

  // ── Fallback: Anthropic API com web_search ──────────────────────────────
  if(!S.apiKey){ ocultarCotacoes(tickerMap, tickers); return; }
  try{
    const lista = tickers.slice(0,15).join(', ');
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:1024,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:`Busque as cotações atuais na B3 dos tickers: ${lista}.\nResponda SOMENTE com JSON puro sem markdown:\n{"TICKER1":{"preco":12.34,"var1d":0.56}}\nPreço em BRL, variação % do dia. Omita tickers não encontrados.`}]
      })
    });
    if(!res.ok) throw new Error();
    const data = await res.json();
    const textBlock = data.content?.find(b=>b.type==='text');
    const cotacoes = JSON.parse((textBlock?.text||'{}').replace(/```json|```/g,'').trim());
    aplicarCotacoes(cotacoes, tickerMap, tickers);
  } catch{ ocultarCotacoes(tickerMap, tickers); }
}

function aplicarCotacoes(cotacoes, tickerMap, tickers){
  Object.entries(cotacoes).forEach(([ticker,q])=>{
    (tickerMap[ticker]||[]).forEach(id=>{
      const el=document.getElementById(`cot-${id}`);
      if(!el) return;
      const preco=+q.preco, var1d=+q.var1d;
      if(!preco) return;
      const cor=var1d>=0?'var(--green)':'var(--red)';
      const sinal=var1d>=0?'▲':'▼';
      const moeda=q.moeda&&q.moeda!=='BRL'?q.moeda:'R$';
      const precoFmt=moeda==='R$'
        ? `R$ ${preco.toFixed(2).replace('.',',')}`
        : `${moeda} ${preco.toFixed(2)}`;
      el.innerHTML=`
        <div class="inv-row-col-label">Cotação</div>
        <div class="inv-row-col-val" style="color:var(--text)">${precoFmt}</div>
        <div class="inv-row-col-sub" style="color:${cor}">${sinal} ${Math.abs(var1d).toFixed(2)}% hoje</div>`;
    });
  });
  tickers.forEach(t=>{
    if(!cotacoes[t]) (tickerMap[t]||[]).forEach(id=>{
      const el=document.getElementById(`cot-${id}`); if(el) el.style.display='none';
    });
  });
}
function ocultarCotacoes(tickerMap, tickers){
  tickers.forEach(t=>(tickerMap[t]||[]).forEach(id=>{
    const el=document.getElementById(`cot-${id}`); if(el) el.style.display='none';
  }));
}

// ── AI Statement Scan (múltiplos lançamentos de uma vez) ───────────────────────
let stmtFileInput=null;
function triggerStatementScan(){
  if(!S.apiKey){setState({stmtScanErr:'Configure sua API Key nas Configurações (⚙️) primeiro.'});return;}
  if(!stmtFileInput){stmtFileInput=document.createElement('input');stmtFileInput.type='file';stmtFileInput.accept='image/*';stmtFileInput.multiple=true;stmtFileInput.style.display='none';document.body.appendChild(stmtFileInput);}
  stmtFileInput.onchange=async e=>{
    const files=[...e.target.files];
    if(!files.length)return;
    setState({stmtScanLoad:true,stmtScanErr:''});
    try{
      const imgs=await Promise.all(files.map(async f=>({b64:await toB64(f),mt:f.type||'image/jpeg'})));
      const anoRef=(S.mes||curMo()).slice(0,4);
      const prompt=`Analise estas imagens de um extrato ou fatura de cartão de crédito. Extraia TODOS os lançamentos/compras visíveis (ignore linhas de resumo, total da fatura, pagamento anterior e limite disponível).\nRetorne SOMENTE um array JSON, sem markdown, nesse formato exato:\n[{"data":"YYYY-MM-DD","descricao":"string","valor":number,"categoria":"uma de: ${IMPORT_CATS.join(',')}"}]\nRegras: valor sempre positivo e decimal (ex: 34.99). Se o ano não estiver visível, use ${anoRef}. Uma entrada por lançamento, na ordem em que aparecem nas imagens. Se houver múltiplas imagens, trate como páginas do mesmo extrato.`;
      const content=[...imgs.map(im=>({type:'image',source:{type:'base64',media_type:im.mt,data:im.b64}})),{type:'text',text:prompt}];
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:4096,messages:[{role:'user',content}]})});
      if(!res.ok) throw new Error('http-'+res.status);
      const d=await res.json();
      const raw=d.content?.find(b=>b.type==='text')?.text||'[]';
      const parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());
      const rows=(Array.isArray(parsed)?parsed:[]).filter(r=>r&&r.data&&(+r.valor)>0).map(r=>({
        data:r.data, descricao:String(r.descricao||'Lançamento').slice(0,80),
        valor:+(+r.valor).toFixed(2),
        categoria:IMPORT_CATS.includes(r.categoria)?r.categoria:'Outros',
      }));
      if(!rows.length){setState({stmtScanLoad:false,stmtScanErr:'Não encontrei lançamentos nessas imagens. Tente fotos mais nítidas ou lance manualmente.'});return;}
      setState({stmtScanLoad:false,stmtScanErr:''});
      loadImportData({source:'Extrato via IA',mes:S.mes,lancamentos:rows});
    }catch{
      setState({stmtScanLoad:false,stmtScanErr:'Não foi possível ler o extrato. Tente novamente ou lance manualmente.'});
    }
    stmtFileInput.value='';
  };
  stmtFileInput.click();
}
